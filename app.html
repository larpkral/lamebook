<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lamebook</title>
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>

<!-- ── BACKGROUND ORBS ───────────────────────────────────── -->
<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- ── TOP NAV ──────────────────────────────────────────── -->
<nav id="topnav">

  <div class="nav-left">
    <a class="nav-logo" href="#feed">lamebook</a>
    <div class="nav-search">
      <span class="ico">🔍</span>
      <input type="text" id="nav-search-input" placeholder="Search Lamebook" autocomplete="off">
    </div>
  </div>

  <div class="nav-center">
    <a class="nav-tab" href="#feed" data-route="feed" title="Home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a class="nav-tab" href="#friends" data-route="friends" title="Friends">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    </a>
    <a class="nav-tab" href="#stories" data-route="stories" title="Stories">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/></svg>
    </a>
    <a class="nav-tab" href="#groups" data-route="groups" title="Groups">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM8 17.5c0-1.38 2.69-2.5 4-2.5s4 1.12 4 2.5v.5H8v-.5zm9.93-3.28c-.88-.95-3.04-1.72-5.93-1.72s-5.05.77-5.93 1.72C5.42 13.36 5 12.24 5 11c0-3.87 3.13-7 7-7s7 3.13 7 7c0 1.24-.42 2.36-1.07 3.22zM12 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
    </a>
  </div>

  <div class="nav-right">
    <a class="nav-icon-btn" href="#messages" title="Messenger">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      <span class="badge" id="msg-badge" style="display:none"></span>
    </a>
    <a class="nav-icon-btn" href="#notifications" title="Notifications">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <span class="badge" id="notif-badge" style="display:none"></span>
    </a>
    <button class="nav-profile-btn" id="account-btn">
      <div id="nav-av"></div>
      <span id="nav-fname"></span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text2)"><path d="M7 10l5 5 5-5z"/></svg>
    </button>
    <div class="dropdown" id="account-menu" style="right:12px;top:60px">
      <div class="dropdown-item" id="goto-profile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        Profile
      </div>
      <div class="dropdown-item" style="color:#fc8181" id="goto-logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        Log out
      </div>
    </div>
  </div>

</nav>

<!-- ── LAYOUT ────────────────────────────────────────────── -->
<div id="main-layout">

  <!-- Left sidebar -->
  <div id="left-sidebar">
    <div class="sb-profile" id="sb-profile-link">
      <div id="sb-av"></div>
      <span id="sb-name"></span>
    </div>
    <hr class="sb-divider">
    <a class="sb-link" href="#friends" data-route="friends">
      <div class="sb-icon">👥</div>Friends
    </a>
    <a class="sb-link" href="#messages" data-route="messages">
      <div class="sb-icon">💬</div>Messenger
    </a>
    <a class="sb-link" href="#notifications" data-route="notifications">
      <div class="sb-icon">🔔</div>Notifications
    </a>
    <a class="sb-link" href="#groups" data-route="groups">
      <div class="sb-icon">🌐</div>Groups
    </a>
    <a class="sb-link" href="#stories" data-route="stories">
      <div class="sb-icon">📖</div>Stories
    </a>
    <hr class="sb-divider">
    <div class="sb-section">Shortcuts</div>
  </div>

  <!-- Center content -->
  <main id="content"></main>

  <!-- Right sidebar -->
  <div id="right-sidebar">
    <div class="rs-title">Contacts</div>
    <div id="contacts-list"></div>
  </div>

</div>

<script type="module">
import { getSession, getProfile, logout } from './js/auth.js';
import { supabase }                        from './js/supabase.js';
import { setCurrentUser, initRouter }      from './js/router.js';
import { updateBadge, subscribeNotifications } from './js/notifications.js';

/* ── Auth guard ─────────────────────────── */
const session = await getSession();
if (!session) { window.location.href = './login.html'; throw new Error('unauth'); }

const currentUser    = session.user;
const currentProfile = await getProfile(currentUser.id);

/* ── Helper ─────────────────────────────── */
function avEl(url, name, size) {
  const s = `width:${size}px;height:${size}px;font-size:${Math.round(size*.38)}px`;
  if (url) return `<img src="${url}" alt="" style="${s};border-radius:50%;object-fit:cover">`;
  const ini = (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return `<div class="av-ph" style="${s}">${ini}</div>`;
}

/* ── Populate sidebar ───────────────────── */
document.getElementById('sb-av').innerHTML   = avEl(currentProfile.avatar_url, currentProfile.full_name, 36);
document.getElementById('sb-name').textContent = currentProfile.full_name || '';
document.getElementById('sb-profile-link').addEventListener('click', () => { window.location.hash = '#profile/' + currentUser.id; });

/* ── Populate nav ───────────────────────── */
document.getElementById('nav-av').innerHTML   = avEl(currentProfile.avatar_url, currentProfile.full_name, 34);
document.getElementById('nav-fname').textContent = (currentProfile.full_name||'').split(' ')[0];

/* ── Sidebar active link ─────────────────── */
document.querySelectorAll('.sb-link[data-route]').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
  });
});

/* ── Account dropdown ───────────────────── */
const accountBtn  = document.getElementById('account-btn');
const accountMenu = document.getElementById('account-menu');
accountBtn.addEventListener('click', e => { e.stopPropagation(); accountMenu.classList.toggle('open'); });
document.addEventListener('click', () => accountMenu.classList.remove('open'));
document.getElementById('goto-profile').addEventListener('click', () => { accountMenu.classList.remove('open'); window.location.hash = '#profile/' + currentUser.id; });
document.getElementById('goto-logout').addEventListener('click', logout);

/* ── Nav search ────────────────────────── */
document.getElementById('nav-search-input').addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const q = e.target.value.trim(); if (!q) return;
  const { data } = await supabase.from('profiles').select('id').ilike('full_name', `%${q}%`).limit(1);
  if (data?.[0]) window.location.hash = '#profile/' + data[0].id;
});

/* ── Right sidebar: contacts ────────────── */
async function loadContacts() {
  const { data: fs } = await supabase.from('friendships')
    .select('requester_id,addressee_id')
    .or(`requester_id.eq.${currentUser.id},addressee_id.eq.${currentUser.id}`)
    .eq('status','accepted');
  const ids = (fs||[]).map(f => f.requester_id===currentUser.id ? f.addressee_id : f.requester_id);
  if (!ids.length) return;
  const { data: friends } = await supabase.from('profiles').select('id,full_name,avatar_url').in('id', ids).limit(15);
  const list = document.getElementById('contacts-list');
  (friends||[]).forEach(f => {
    const row = document.createElement('div');
    row.className = 'contact-row';
    row.innerHTML = `
      <div class="contact-av">${avEl(f.avatar_url, f.full_name, 36)}<div class="online-dot"></div></div>
      <div class="contact-name">${f.full_name||''}</div>`;
    row.addEventListener('click', () => { window.location.hash = '#messages/' + f.id; });
    list.appendChild(row);
  });
}

/* ── Message badge ─────────────────────── */
async function updateMsgBadge() {
  try {
    const { count } = await supabase.from('messages').select('*',{count:'exact',head:true}).eq('receiver_id',currentUser.id).eq('read',false);
    const b = document.getElementById('msg-badge');
    if (count > 0) { b.textContent = count > 99 ? '99+' : count; b.style.display = 'block'; }
    else b.style.display = 'none';
  } catch(_) {}
}

/* ── Nav tab highlight ─────────────────── */
function highlightNav() {
  const base = (window.location.hash||'#feed').slice(1).split('/')[0];
  document.querySelectorAll('.nav-tab[data-route]').forEach(el =>
    el.classList.toggle('active', el.dataset.route === base));
  document.querySelectorAll('.sb-link[data-route]').forEach(el =>
    el.classList.toggle('active', el.dataset.route === base));
}
window.addEventListener('hashchange', highlightNav);
highlightNav();

/* ── Init ──────────────────────────────── */
setCurrentUser(currentUser, currentProfile);
initRouter();
loadContacts();
updateBadge(currentUser.id);
updateMsgBadge();
subscribeNotifications(currentUser.id);

/* ── Realtime: message badge ───────────── */
supabase.channel('msg-badge')
  .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`receiver_id=eq.${currentUser.id}` }, updateMsgBadge)
  .subscribe();
</script>
</body>
</html>
